          example: PAY-20250001
        grantId:
          type: string
          format: uuid
          example: 8e65e3e5-2d5b-4a2a-9c1f-1f2e3d4c5b6a
        creationDateTime:
          type: string
          format: date-time
          example: 2025-10-03T10:30:00Z
        statusUpdateDateTime:
          type: string
          format: date-time
          example: 2025-10-03T10:30:05Z
        requestedExecutionDateTime:
          type: string
          format: date-time
          example: 2025-11-15T15:00:00Z
        expectedExecutionDateTime:
          type: string
          format: date-time
          example: 2025-11-15T15:00:05Z
        expectedSettlementDateTime:
          type: string
          format: date-time
          example: 2025-11-15T15:10:00Z
        paymentStatus:
          type: string
          example: EXECUTED
          description: "Enum: RECEIVED, PENDING_APPROVAL, EXECUTED, REJECTED, CANCELLED, EXPIRED"
        statusReason:
          type: object
          properties:
            code:
              type: string
              example: "2101"
            description:
              type: string
              example: En espera de firma del apoderado
            category:
              type: string
              example: AUTHZ
        transactionType:
          type: string
          example: TEF_SINGLE_IMMEDIATE
        endToEndId:
          type: string
          example: E2E-2025-000000123
        bankTrackingId:
          type: string
          example: BNK-ABC-9991
        debtorInstitutionId:
          type: string
          example: "14"
        debtorAccountNumber:
          type: string
          example: "123456789"
        debtorAccountType:
          type: string
          example: CHECKING
        debtorName:
          type: string
          example: EMPRESA ABC S.A.
        debtorIdentification:
          type: string
          example: 76.123.456-7
        debtorRepresentativeId:
          type: string
          example: 9.876.543-2
        debtorRepresentativeRole:
          type: string
          example: APODERADO
        creditorInstitutionId:
          type: string
          example: "1"
        creditorAccountNumber:
          type: string
          example: "9876543210"
        creditorAccountType:
          type: string
          example: CHECKING
        creditorName:
          type: string
          example: PROVEEDORES XYZ LTDA.
        creditorIdentification:
          type: string
          example: 11.222.333-4
        amount:
          type: number
          example: 150000
        currency:
          type: string
          example: CLP
        remittanceInformation:
          type: string
          example: Pago de servicios
