services:
  postgres:
    image: postgres:16
    container_name: api-scheduled-payment-service-db
    environment:
      POSTGRES_DB: api_immediate_payment_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_immediate_payment_service_db"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata_api-scheduled-payment-service:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:lts-community
    container_name: api-scheduled-payment-service-sonarqube
    profiles: ["sonar"]
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data_api-scheduled-payment-service:/opt/sonarqube/data
      - sonarqube_logs_api-scheduled-payment-service:/opt/sonarqube/logs
      - sonarqube_extensions_api-scheduled-payment-service:/opt/sonarqube/extensions

  sonar-db:
    image: postgres:16
    container_name: api-scheduled-payment-service-sonar-db
    profiles: ["sonar"]
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - sonar_pgdata_api-scheduled-payment-service:/var/lib/postgresql/data

volumes:
  pgdata_api-scheduled-payment-service:
  sonarqube_data_api-scheduled-payment-service:
  sonarqube_logs_api-scheduled-payment-service:
  sonarqube_extensions_api-scheduled-payment-service:
  sonar_pgdata_api-scheduled-payment-service:
