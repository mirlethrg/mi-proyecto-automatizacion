services:
  postgres:
    image: postgres:16
    container_name: qa-automation-engine-db
    environment:
      POSTGRES_DB: qa_automation_engine_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qa_automation_engine_db"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata_qa-automation-engine:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:lts-community
    container_name: qa-automation-engine-sonarqube
    profiles: ["sonar"]
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data_qa-automation-engine:/opt/sonarqube/data
      - sonarqube_logs_qa-automation-engine:/opt/sonarqube/logs
      - sonarqube_extensions_qa-automation-engine:/opt/sonarqube/extensions

  sonar-db:
    image: postgres:16
    container_name: qa-automation-engine-sonar-db
    profiles: ["sonar"]
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - sonar_pgdata_qa-automation-engine:/var/lib/postgresql/data

volumes:
  pgdata_qa-automation-engine:
  sonarqube_data_qa-automation-engine:
  sonarqube_logs_qa-automation-engine:
  sonarqube_extensions_qa-automation-engine:
  sonar_pgdata_qa-automation-engine:

