spring.profiles.active=local

spring.application.name=api-scheduled-payment-service
server.port=${PORT:8080}

spring.web.resources.add-mappings=false
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force-response=true

server.compression.enabled=true
server.compression.mime-types=application/json
server.compression.min-response-size=1024

# Management / health probes
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info
management.server.port=${HEALTH_PORT:${PORT:8080}}

# Logging
logging.config=classpath:logback-cloud.xml

# Integration
ms.scheduled.payment.base-url=http://localhost:8081/scheduled-payments/v1
ms.scheduled.payment.timeout=10000
